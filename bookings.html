<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BHF Staff Bookings</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="logo-section">
          <img
            class="bhf-logo"
            src="/bhf-logo-white.svg"
            width="124"
            height="35"
            alt="British Heart Foundation"
          />
          <p class="header-tagline">BCS Conference 2026</p>
        </div>
      </div>
    </header>

    <main>
      <button type="button" class="btn-back" onclick="window.location.href='/'">
        ← Back to home
      </button>

      <section class="intro-section">
        <h1 class="bookings-title">Staff Bookings</h1>
        <p class="intro-note">
          This page is for on-site staff only. Enter the shared password to view all bookings.
        </p>
      </section>

      <section id="access-card" class="intro-section">
        <form id="staff-login-form" class="staff-login-form">
          <div class="form-group">
            <label for="staff-password">Shared password</label>
            <input
              type="password"
              id="staff-password"
              required
              placeholder="Enter staff password"
              autocomplete="current-password"
            />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-submit-form">Unlock bookings</button>
          </div>
          <p id="login-error" class="login-error hidden"></p>
        </form>
      </section>

      <section id="bookings-card" class="schedule-card hidden">
        <div class="bookings-toolbar">
          <p id="bookings-count" class="bookings-count"></p>
          <div class="bookings-toolbar-actions">
            <div class="bookings-group-toggle" role="group" aria-label="Group bookings by">
              <button id="btn-group-time" type="button" class="btn-cancel-form is-active" aria-pressed="true">
                Group by time
              </button>
              <button id="btn-group-section" type="button" class="btn-cancel-form" aria-pressed="false">
                Group by section
              </button>
            </div>
          </div>
        </div>
        <div class="bookings-table-wrap">
          <table class="bookings-table">
            <thead>
              <tr>
                <th>Day</th>
                <th>Time</th>
                <th>Representative</th>
                <th>Field</th>
                <th>Name</th>
                <th>Email</th>
                <th>Booked at</th>
              </tr>
            </thead>
            <tbody id="bookings-table-body"></tbody>
          </table>
        </div>
        <div class="danger-zone">
          <button id="btn-delete-all-bookings" type="button" class="btn-danger">
            Delete all bookings
          </button>
        </div>
      </section>
    </main>

    <dialog id="delete-all-dialog">
      <div class="modal-header">
        <h3>Delete all bookings?</h3>
        <button class="btn-close-modal" id="btn-close-delete-all-dialog" aria-label="Close">
          &times;
        </button>
      </div>
      <div class="modal-body">
        <p class="cancel-message">
          This action cannot be undone. All booking data will be permanently deleted.
        </p>
        <div class="form-group">
          <label for="delete-confirm-input">Type <strong>CONFIRM DELETE</strong> to continue</label>
          <input
            type="text"
            id="delete-confirm-input"
            placeholder="CONFIRM DELETE"
            autocomplete="off"
          />
        </div>
        <div class="form-actions">
          <button type="button" class="btn-cancel-form" id="btn-cancel-delete-all">Cancel</button>
          <button type="button" class="btn-danger" id="btn-confirm-delete-all" disabled>
            Permanently delete all
          </button>
        </div>
      </div>
    </dialog>

    <script type="module" src="/src/bookings.js"></script>
  </body>
</html>
